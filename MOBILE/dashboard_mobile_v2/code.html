<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>FairHire AI | Mobile Dashboard</title></head>
  <body style="margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#07111d 0%,#0f1a2f 100%);color:#f8fafc;">
    <main style="padding:20px;">
      <div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:20px;">
        <p style="color:#7ce7d9;font-size:12px;text-transform:uppercase;letter-spacing:.14em;">Dashboard</p>
        <h1 style="margin:10px 0 8px;font-size:30px;">Fairness metrics at a glance.</h1>
        <p style="color:#cbd5e1;line-height:1.6;">Track model accuracy, bias spread, and explanation status from a compact mobile layout.</p>
        <div style="display:grid;gap:12px;margin-top:18px;">
          <div style="padding:14px;border-radius:18px;background:rgba(255,255,255,.06);"><strong>Accuracy</strong><div>0.92</div></div>
          <div style="padding:14px;border-radius:18px;background:rgba(255,255,255,.06);"><strong>Fairness Index</strong><div>0.84</div></div>
        </div>
      </div>
    </main>
