<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FairHire AI | Mobile Landing</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: linear-gradient(180deg, #0b1220 0%, #101c33 100%); color: #f8fafc; }
      main { min-height: 100vh; padding: 24px 18px 32px; box-sizing: border-box; }
      .card { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 24px; padding: 20px; backdrop-filter: blur(18px); }
      .badge { display: inline-flex; padding: 8px 12px; border-radius: 999px; background: rgba(51,201,184,.15); color: #7ce7d9; font-weight: 700; font-size: 12px; }
      h1 { font-size: 34px; line-height: 1.05; margin: 16px 0 12px; }
      p { color: #cbd5e1; line-height: 1.6; }
      .actions { display: grid; gap: 12px; margin-top: 20px; }
      a { display: inline-flex; justify-content: center; padding: 14px 16px; border-radius: 16px; text-decoration: none; font-weight: 700; }
      .primary { background: #7ce7d9; color: #03151a; }
      .secondary { background: rgba(255,255,255,.08); color: #f8fafc; }
      .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
      .stat { padding: 14px; border-radius: 18px; background: rgba(255,255,255,.06); }
      .stat strong { display: block; font-size: 20px; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <span class="badge">Mobile-first compliance</span>
        <h1>Audit hiring decisions from anywhere.</h1>
        <p>Upload datasets, inspect fairness, and share board-ready evidence without leaving your phone.</p>
        <div class="stats">
          <div class="stat"><strong>3 min</strong><span>upload to insight</span></div>
          <div class="stat"><strong>EEOC</strong><span>aligned checks</span></div>
        </div>
        <div class="actions">
          <a class="primary" href="/">Open app</a>
          <a class="secondary" href="/web/landing">Desktop experience</a>
        </div>
      </div>
    </main>
  </body>
</html>
